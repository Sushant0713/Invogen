# Production Compose — Invogen (MERN)
# Usage on VPS:
#   1. Place a production .env next to this file (never commit secrets).
#   2. docker compose up -d --build
#
# Frontend: http://<host>:3000  (nginx → SPA + /api proxy)
# Backend:  http://<host>:5000  (Express; also used for webhooks)

name: invogen

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: invogen-server:latest
    container_name: invogen-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "5000"
      # Override common defaults for container networking when not set in .env
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:5000/api/v1}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - invogen-net

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # Same-origin API via nginx proxy (recommended). Override if you use a separate API domain.
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID:-}}
    image: invogen-client:latest
    container_name: invogen-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - invogen-net

networks:
  invogen-net:
    driver: bridge
