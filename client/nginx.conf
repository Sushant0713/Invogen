# Production nginx for Invogen SPA (listens on 3000)
# Proxies /api to the backend service so the browser can use same-origin VITE_API_URL=/api/v1

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight liveness for Docker HEALTHCHECK
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Reverse-proxy API + uploads to Express (service name: server)
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        proxy_pass_header Set-Cookie;

        # Uploads / PDF generation can be slow
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        client_max_body_size 25m;
    }

    # Cache hashed Vite assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
